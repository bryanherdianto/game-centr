server {
    listen 8080;
    server_name _;

    # Security headers (applied to all responses, including errors).
    # NOTE: nginx's add_header does NOT inherit into a location block that defines
    # its own add_header, so these are repeated inside the /assets block below.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; script-src 'self'; connect-src 'self' https://sbd-numbrhunt.jpmd53.easypanel.host http://localhost:8080" always;
    # HSTS only takes effect over HTTPS; TLS is terminated upstream (hosting platform / load balancer).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;  # This is the critical line for React Router
    }

    # Optional: Configure caching for static assets.
    location /assets {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        # Security headers must be repeated here because this location defines its own
        # add_header, which prevents inheritance of the server-level headers above.
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; script-src 'self'; connect-src 'self' https://sbd-numbrhunt.jpmd53.easypanel.host http://localhost:8080" always;
        # HSTS only takes effect over HTTPS; TLS is terminated upstream.
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }
}
